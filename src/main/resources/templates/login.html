<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" data-bs-theme="light">
<head>
    <title>Login - MotoBuild</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/css/motobuild-theme.css?v=2">

    <style>
        .auth-wrapper {
            min-height: 75vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .auth-card {
            max-width: 450px;
            width: 100%;
            border-radius: 16px;
            overflow: hidden;
        }

        .theme-toggle-btn {
            position: fixed;
            bottom: 25px;
            right: 25px;
            width: 54px;
            height: 54px;
            border-radius: 50%;
            border: none;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0;
            z-index: 9999;
            box-shadow: 0 4px 14px rgba(0, 0, 0, 0.3);
            transition: transform 0.2s ease, box-shadow 0.2s ease, background-color 0.25s ease;
        }

        .theme-toggle-btn:hover {
            transform: scale(1.08) rotate(8deg);
        }

        .theme-toggle-icon {
            width: 30px;
            height: 30px;
            object-fit: contain;
        }

        .theme-icon-animate {
            animation: themeIconSpin 0.35s ease;
        }

        @keyframes themeIconSpin {
            0% {
                opacity: 0;
                transform: rotate(-120deg) scale(0.5);
            }

            100% {
                opacity: 1;
                transform: rotate(0deg) scale(1);
            }
        }
    </style>
</head>

<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand fw-bold" href="/login">MotoBuild</a>

        <div class="d-flex gap-2">
            <a class="btn btn-light btn-sm" href="/login">Login</a>
            <a class="btn btn-outline-light btn-sm" href="/register">Register</a>
        </div>
    </div>
</nav>

<div class="container auth-wrapper">
    <div class="card auth-card shadow-sm">
        <div class="card-body p-4">
            <h1 class="fw-bold motobuild-title mb-2">Login</h1>
            <p class="text-body-secondary">Sign in to manage your builds.</p>

            <div th:if="${errorMessage}" class="alert alert-danger" th:text="${errorMessage}"></div>

            <form method="post" action="/login">
                <div class="mb-3">
                    <label class="form-label">Email</label>
                    <input type="email"
                           name="email"
                           class="form-control"
                           placeholder="Username"
                           required>
                </div>

                <div class="mb-3">
                    <label class="form-label">Password</label>
                    <input type="password"
                           name="password"
                           class="form-control"
                           placeholder="Password"
                           required>
                </div>

                <button type="submit" class="btn btn-motobuild-purple w-100">
                    Login
                </button>
            </form>

            <p class="text-body-secondary mt-3 mb-0">
                Don’t have an account?
                <a href="/register">Create one</a>
            </p>

            <p class="text-body-secondary small mt-3 mb-0">
                Test login: test@motobuild.local / password
            </p>
        </div>
    </div>
</div>

<button id="themeToggle" class="theme-toggle-btn" type="button">
    <img id="themeIcon" class="theme-toggle-icon" src="/images/ui/moon.png" alt="Switch theme">
</button>

<script src="/js/theme.js?v=2"></script>
</body>
</html>
