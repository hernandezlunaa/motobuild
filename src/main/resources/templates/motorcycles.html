<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" data-bs-theme="light">
<head>
    <title>Motorcycles - MotoBuild</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/css/motobuild-theme.css?v=1">

    <style>
        .motorcycle-img {
            width: 160px;
            height: 100px;
            object-fit: cover;
            border-radius: 10px;
        }

        .theme-toggle-btn {
            position: fixed;
            bottom: 25px;
            right: 25px;
            width: 54px;
            height: 54px;
            border-radius: 50%;
            border: none;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0;
            z-index: 9999;
            box-shadow: 0 4px 14px rgba(0, 0, 0, 0.3);
            transition: transform 0.2s ease, box-shadow 0.2s ease, background-color 0.25s ease;
        }

        .theme-toggle-btn:hover {
            transform: scale(1.08) rotate(8deg);
            box-shadow: 0 6px 18px rgba(0, 0, 0, 0.4);
        }

        .theme-toggle-icon {
            width: 30px;
            height: 30px;
            object-fit: contain;
        }

        .theme-icon-animate {
            animation: themeIconSpin 0.35s ease;
        }

        @keyframes themeIconSpin {
            0% {
                opacity: 0;
                transform: rotate(-120deg) scale(0.5);
            }

            100% {
                opacity: 1;
                transform: rotate(0deg) scale(1);
            }
        }
    </style>
</head>

<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand fw-bold" href="/">MotoBuild</a>

        <div class="d-flex gap-2">
            <a class="btn btn-light btn-sm" href="/motorcycles">Motorcycles</a>
            <a class="btn btn-outline-light btn-sm" href="/parts">Parts</a>
            <a class="btn btn-outline-light btn-sm" href="/builds">Builds</a>
        </div>
    </div>
</nav>

<div class="container mt-5 mb-5">
    <div class="d-flex justify-content-between align-items-start flex-wrap gap-3 mb-4">
        <div>
            <h1 class="fw-bold motobuild-title">Motorcycles</h1>
            <p class="text-body-secondary mb-0">
                These are the motorcycles available for creating builds.
            </p>
        </div>

        <a href="/builds" class="btn btn-motobuild-purple btn-lg">Create / View Builds</a>
    </div>

    <div class="card shadow-sm">
        <div class="card-body">
            <div class="table-responsive">
                <table class="table table-striped table-bordered align-middle mb-0">
                    <thead class="table-dark">
                    <tr>
                        <th>Image</th>
                        <th>Make</th>
                        <th>Model</th>
                        <th>Year</th>
                        <th>Engine CC</th>
                        <th>Type</th>
                    </tr>
                    </thead>

                    <tbody>
                    <tr th:each="motorcycle : ${motorcycles}">
                        <td>
                            <img th:if="${motorcycle.imageUrl != null}"
                                 th:src="@{'/images/' + ${motorcycle.imageUrl}}"
                                 alt="Motorcycle image"
                                 class="motorcycle-img">
                        </td>

                        <td th:text="${motorcycle.make}"></td>
                        <td th:text="${motorcycle.model}"></td>
                        <td th:text="${motorcycle.year}"></td>
                        <td th:text="${motorcycle.engineCc}"></td>
                        <td th:text="${motorcycle.bikeType}"></td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<button id="themeToggle" class="theme-toggle-btn" type="button">
    <img id="themeIcon" class="theme-toggle-icon" src="/images/ui/moon.png" alt="Switch theme">
</button>

<script src="/js/theme.js?v=2"></script>
</body>
</html>
