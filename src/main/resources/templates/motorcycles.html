<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" data-bs-theme="light">
<head>
    <title>Motorcycles - MotoBuild</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/css/motobuild-theme.css?v=2">

    <style>
        .motorcycle-card {
            border-radius: 16px;
            overflow: hidden;
        }

        .motorcycle-img {
            width: 160px;
            height: 110px;
            object-fit: contain;
            border-radius: 10px;
        }

        .motorcycle-card-body {
            min-height: 205px;
            display: flex;
            flex-direction: column;
        }

        .motorcycle-top {
            display: grid;
            grid-template-columns: 170px 1fr;
            gap: 16px;
            align-items: center;
        }

        .motorcycle-actions {
            margin-top: auto;
            display: flex;
            justify-content: flex-end;
        }

        .build-bike-btn {
            white-space: nowrap;
        }

        .theme-toggle-btn {
            position: fixed;
            bottom: 25px;
            right: 25px;
            width: 54px;
            height: 54px;
            border-radius: 50%;
            border: none;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0;
            z-index: 9999;
            box-shadow: 0 4px 14px rgba(0, 0, 0, 0.3);
            transition: transform 0.2s ease, box-shadow 0.2s ease, background-color 0.25s ease;
        }

        .theme-toggle-btn:hover {
            transform: scale(1.08) rotate(8deg);
            box-shadow: 0 6px 18px rgba(0, 0, 0, 0.4);
        }

        .theme-toggle-icon {
            width: 30px;
            height: 30px;
            object-fit: contain;
        }

        .theme-icon-animate {
            animation: themeIconSpin 0.35s ease;
        }

        @keyframes themeIconSpin {
            0% {
                opacity: 0;
                transform: rotate(-120deg) scale(0.5);
            }

            100% {
                opacity: 1;
                transform: rotate(0deg) scale(1);
            }
        }

        @media (max-width: 767px) {
            .motorcycle-top {
                grid-template-columns: 1fr;
                text-align: center;
            }

            .motorcycle-img {
                width: 190px;
                height: 130px;
            }

            .motorcycle-actions {
                justify-content: center;
            }

            .build-bike-btn {
                width: 100%;
            }
        }
    </style>
</head>

<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand fw-bold" href="/">MotoBuild</a>

        <div class="d-flex gap-2">
            <a class="btn btn-light btn-sm" href="/motorcycles">Motorcycles</a>
            <a class="btn btn-outline-light btn-sm" href="/parts">Parts</a>
            <a class="btn btn-outline-light btn-sm" href="/builds">Builds</a>
            <a class="btn btn-outline-light btn-sm" href="/account">Account</a>
            <a class="btn btn-outline-light btn-sm" href="/logout">Logout</a>
        </div>
    </div>
</nav>

<div class="container mt-5 mb-5">
    <div class="d-flex justify-content-between align-items-start flex-wrap gap-3 mb-4">
        <div>
            <h1 class="fw-bold motobuild-title">Motorcycles</h1>
            <p class="text-body-secondary mb-0">
                Browse available motorcycles and start a build from the bike you want.
            </p>
        </div>

        <a href="/builds" class="btn btn-primary">
            Create / View Builds
        </a>
    </div>

    <div class="row g-4">
        <div class="col-lg-6" th:each="motorcycle : ${motorcycles}">
            <div class="card motorcycle-card shadow-sm h-100">
                <div class="card-body motorcycle-card-body">
                    <div class="motorcycle-top">
                        <div class="text-center">
                            <img th:if="${motorcycle.imageUrl != null}"
                                 th:src="@{'/images/bikes/' + ${motorcycle.imageUrl}}"
                                 alt="Motorcycle image"
                                 class="motorcycle-img">
                        </div>

                        <div>
                            <h4 class="fw-bold mb-1">
                                <span th:text="${motorcycle.year}"></span>
                                <span th:text="${motorcycle.make}"></span>
                                <span th:text="${motorcycle.model}"></span>
                            </h4>

                            <p class="text-body-secondary mb-1">
                                <strong>Engine:</strong>
                                <span th:text="${motorcycle.engineCc}"></span>cc
                            </p>

                            <p class="text-body-secondary mb-0">
                                <strong>Type:</strong>
                                <span th:text="${motorcycle.bikeType}"></span>
                            </p>
                        </div>
                    </div>

                    <div class="motorcycle-actions">
                        <a th:href="@{/builds(motorcycleId=${motorcycle.motorcycleId})}"
                           class="btn btn-motobuild-purple build-bike-btn">
                            Build With This Bike
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<button id="themeToggle" class="theme-toggle-btn" type="button">
    <img id="themeIcon" class="theme-toggle-icon" src="/images/ui/moon.png" alt="Switch theme">
</button>

<script src="/js/theme.js?v=2"></script>
</body>
</html>
