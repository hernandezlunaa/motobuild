<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" data-bs-theme="light">
<head>
    <title>Motorcycles - MotoBuild</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand fw-bold" href="/">MotoBuild</a>

        <div class="d-flex gap-2">
<!--            <a class="btn btn-outline-light btn-sm" href="/motorcycles">Motorcycles</a>-->
            <a class="btn btn-outline-light btn-sm" href="/parts">Parts</a>
            <button id="themeToggle" class="btn btn-outline-light btn-sm" type="button">Dark Mode</button>
        </div>
    </div>
</nav>

<div class="container mt-5">
    <h1 class="fw-bold">Motorcycles</h1>
    <p class="text-body-secondary">These motorcycles are loaded from the MySQL database.</p>

    <div class="table-responsive shadow-sm rounded">
        <table class="table table-striped table-bordered align-middle mb-0">
            <thead class="table-dark">
            <tr>
                <th>ID</th>
                <th>Image</th>
                <th>Make</th>
                <th>Model</th>
                <th>Year</th>
                <th>Engine CC</th>
                <th>Type</th>
            </tr>
            </thead>

            <tbody>
            <tr th:each="motorcycle : ${motorcycles}">
                <td th:text="${motorcycle.motorcycleId}"></td>

                <td>
                    <img th:src="@{'/images/' + ${motorcycle.imageUrl}}"
                         alt="Motorcycle image"
                         class="img-thumbnail"
                         style="width: 130px; height: 85px; object-fit: cover;">
                </td>

                <td th:text="${motorcycle.make}"></td>
                <td th:text="${motorcycle.model}"></td>
                <td th:text="${motorcycle.year}"></td>
                <td th:text="${motorcycle.engineCc}"></td>
                <td th:text="${motorcycle.bikeType}"></td>
            </tr>
            </tbody>
        </table>
    </div>
</div>

<script src="/js/theme.js"></script>
</body>
</html>
