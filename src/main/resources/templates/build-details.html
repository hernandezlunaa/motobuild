<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" data-bs-theme="light">
<head>
    <title>Build Details - MotoBuild</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/css/motobuild-theme.css?v=2">

    <style>
        .build-bike-img {
            width: 100%;
            max-height: 170px;
            object-fit: contain;
        }

        .part-name-hover {
            position: relative;
            display: inline-block;
            cursor: pointer;
            color: #8f73c9;
            font-weight: 600;
        }

        html[data-bs-theme="light"] .part-name-hover {
            color: #7b3fe4;
        }

        .part-preview-img {
            display: none;
            position: absolute;
            left: 0;
            top: 28px;
            width: 190px;
            max-height: 160px;
            object-fit: contain;
            padding: 10px;
            border-radius: 12px;
            background-color: var(--bs-body-bg);
            border: 1px solid rgba(143, 115, 201, 0.35);
            box-shadow: 0 8px 22px rgba(0, 0, 0, 0.35);
            z-index: 2000;
        }

        .part-name-hover:hover .part-preview-img {
            display: block;
        }

        .flash-message {
            transition: opacity 0.6s ease, transform 0.6s ease;
        }

        .flash-message.fade-out {
            opacity: 0;
            transform: translateY(-8px);
        }

        .theme-toggle-btn {
            position: fixed;
            bottom: 25px;
            right: 25px;
            width: 54px;
            height: 54px;
            border-radius: 50%;
            border: none;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0;
            z-index: 9999;
            box-shadow: 0 4px 14px rgba(0, 0, 0, 0.3);
            transition: transform 0.2s ease, box-shadow 0.2s ease, background-color 0.25s ease;
        }

        .theme-toggle-btn:hover {
            transform: scale(1.08) rotate(8deg);
            box-shadow: 0 6px 18px rgba(0, 0, 0, 0.4);
        }

        .theme-toggle-icon {
            width: 30px;
            height: 30px;
            object-fit: contain;
        }

        .theme-icon-animate {
            animation: themeIconSpin 0.35s ease;
        }

        @keyframes themeIconSpin {
            0% {
                opacity: 0;
                transform: rotate(-120deg) scale(0.5);
            }

            100% {
                opacity: 1;
                transform: rotate(0deg) scale(1);
            }
        }
    </style>
</head>

<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand fw-bold" href="/">MotoBuild</a>

        <div class="d-flex gap-2">
            <a class="btn btn-outline-light btn-sm" href="/motorcycles">Motorcycles</a>
            <a class="btn btn-outline-light btn-sm" href="/parts">Parts</a>
            <a class="btn btn-light btn-sm" href="/builds">Builds</a>
        </div>
    </div>
</nav>

<div class="container mt-5 mb-5">

    <a href="/builds" class="btn btn-motobuild-purple fw-semibold mb-3">
        ← Back to Builds
    </a>

    <div class="row g-4 mb-4">
        <div class="col-lg-8">
            <div class="card shadow-sm h-100">
                <div class="card-body">
                    <div class="row align-items-center g-3">
                        <div class="col-md-4 text-center">
                            <img th:if="${build.motorcycle.imageUrl != null}"
                                 th:src="@{'/images/' + ${build.motorcycle.imageUrl}}"
                                 class="build-bike-img"
                                 alt="Motorcycle image">
                        </div>

                        <div class="col-md-8">
                            <h1 class="fw-bold motobuild-title" th:text="${build.buildName}"></h1>

                            <p class="lead mb-2">
                                <span th:text="${build.motorcycle.year}"></span>
                                <span th:text="${build.motorcycle.make}"></span>
                                <span th:text="${build.motorcycle.model}"></span>
                            </p>

                            <p class="text-body-secondary mb-2">
                                <strong>Type:</strong>
                                <span th:text="${build.motorcycle.bikeType}"></span>
                            </p>

                            <p class="text-body-secondary mb-0"
                               th:if="${build.description != null && !#strings.isEmpty(build.description)}"
                               th:text="${build.description}"></p>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="col-lg-4">
            <div class="card shadow-sm h-100">
                <div class="card-body text-center">
                    <h5 class="text-body-secondary">Total Cost</h5>
                    <h2 class="fw-bold">
                        $<span th:text="${#numbers.formatDecimal(totalCost, 1, 2)}"></span>
                    </h2>
                    <a th:href="@{/parts(buildId=${build.buildId})}" class="btn btn-motobuild-purple w-100 mt-2">
                        Add More Parts
                    </a>
                </div>
            </div>
        </div>
    </div>

    <div th:if="${!#lists.isEmpty(warnings)}" class="alert alert-warning shadow-sm">
        <h5 class="fw-bold mb-3">Build Warnings</h5>

        <div class="d-flex flex-column gap-2">
            <div th:each="warning : ${warnings}"
                 class="d-flex justify-content-between align-items-center gap-3 flex-wrap">

                <span th:text="${warning.message}"></span>

                <div class="d-flex gap-2 flex-wrap">
                    <form th:each="action : ${warning.actions}"
                          th:action="@{/builds/{buildId}/parts/{partId}/add(buildId=${build.buildId}, partId=${action.partId})}"
                          method="post">
                        <button type="submit"
                                class="btn btn-sm btn-warning fw-semibold"
                                th:text="${action.label}">
                            Add Part
                        </button>
                    </form>

                    <form th:if="${warning.removeBuildPartId != null}"
                          th:action="@{/builds/{buildId}/parts/{buildPartId}/remove(buildId=${build.buildId}, buildPartId=${warning.removeBuildPartId})}"
                          method="post">
                        <button type="submit"
                                class="btn btn-sm btn-outline-danger fw-semibold"
                                th:text="${warning.removeLabel}">
                            Remove Part
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <div th:if="${successMessage}"
         id="flashMessage"
         class="alert alert-success shadow-sm flash-message"
         role="alert">
        <span th:text="${successMessage}"></span>
    </div>

    <div class="card shadow-sm">
        <div class="card-body">
            <div class="d-flex justify-content-between align-items-center mb-3">
                <h3 class="fw-bold mb-0">Parts in This Build</h3>
                <a th:href="@{/parts(buildId=${build.buildId})}" class="btn btn-outline-primary btn-sm">
                    Add Parts
                </a>
            </div>

            <div th:if="${#lists.isEmpty(build.buildParts)}" class="alert alert-info">
                No parts added yet. Click Add Parts to start building.
            </div>

            <div class="table-responsive" th:if="${!#lists.isEmpty(build.buildParts)}">
                <table class="table table-striped table-bordered align-middle">
                    <thead class="table-dark">
                    <tr>
                        <th>Part</th>
                        <th>Brand</th>
                        <th>Category</th>
                        <th>Price</th>
                        <th>Status</th>
                        <th>Actions</th>
                    </tr>
                    </thead>

                    <tbody>
                    <tr th:each="buildPart : ${build.buildParts}">
                        <td>
                            <span class="part-name-hover">
                                <span th:text="${buildPart.part.partName}"></span>

                                <img th:if="${buildPart.part.imageUrl != null}"
                                     th:src="@{'/images/parts/' + ${buildPart.part.imageUrl}}"
                                     class="part-preview-img"
                                     alt="Part preview">
                            </span>
                        </td>

                        <td th:text="${buildPart.part.brand}"></td>

                        <td th:text="${buildPart.part.category.categoryName}"></td>

                        <td>
                            $<span th:text="${#numbers.formatDecimal(buildPart.lineTotal, 1, 2)}"></span>
                        </td>

                        <td>
                            <form th:action="@{/builds/{buildId}/parts/{buildPartId}/status(buildId=${build.buildId}, buildPartId=${buildPart.buildPartId})}"
                                  method="post"
                                  class="d-flex gap-2">
                                <select name="status" class="form-select form-select-sm">
                                    <option value="planned" th:selected="${buildPart.status == 'planned'}">Planned</option>
                                    <option value="installed" th:selected="${buildPart.status == 'installed'}">Installed</option>
                                    <option value="removed" th:selected="${buildPart.status == 'removed'}">Removed</option>
                                </select>

                                <button type="submit" class="btn btn-outline-primary btn-sm">
                                    Save
                                </button>
                            </form>
                        </td>

                        <td>
                            <form th:action="@{/builds/{buildId}/parts/{buildPartId}/remove(buildId=${build.buildId}, buildPartId=${buildPart.buildPartId})}"
                                  method="post">
                                <button type="submit" class="btn btn-outline-danger btn-sm">
                                    Remove
                                </button>
                            </form>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<button id="themeToggle" class="theme-toggle-btn" type="button">
    <img id="themeIcon" class="theme-toggle-icon" src="/images/ui/moon.png" alt="Switch theme">
</button>

<script>
    document.addEventListener("DOMContentLoaded", () => {
        const flashMessage = document.getElementById("flashMessage");

        if (flashMessage) {
            setTimeout(() => {
                flashMessage.classList.add("fade-out");

                setTimeout(() => {
                    flashMessage.remove();
                }, 600);
            }, 3000);
        }
    });
</script>

<script src="/js/theme.js?v=2"></script>
</body>
</html>
