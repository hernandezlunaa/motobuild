<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" data-bs-theme="light">
<head>
    <title>Parts - MotoBuild</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand fw-bold" href="/">MotoBuild</a>

        <div class="d-flex gap-2">
            <a class="btn btn-outline-light btn-sm" href="/motorcycles">Motorcycles</a>
<!--            <a class="btn btn-outline-light btn-sm" href="/parts">Parts</a>-->
<!--            <button id="themeToggle" class="btn btn-outline-light btn-sm" type="button">Dark Mode</button>-->
        </div>
    </div>
</nav>

<div class="container mt-5">
    <h1 class="fw-bold">Parts Catalog</h1>
    <p class="text-body-secondary">Search, filter, and sort motorcycle parts from the database.</p>

    <div class="row">
        <div class="col-12">
            <form method="get" action="/parts" class="card card-body mb-4 shadow-sm">
                <div class="row g-3 align-items-end">

                    <div class="col-md-3">
                        <label class="form-label">Search</label>
                        <input type="text"
                               class="form-control"
                               name="search"
                               placeholder="Exhaust, Brembo..."
                               th:value="${search}">
                    </div>

                    <div class="col-md-3">
                        <label class="form-label">Category</label>
                        <select class="form-select" name="categoryId">
                            <option value="">All Categories</option>
                            <option th:each="category : ${categories}"
                                    th:value="${category.categoryId}"
                                    th:text="${category.categoryName}"
                                    th:selected="${selectedCategoryId != null && selectedCategoryId == category.categoryId}">
                            </option>
                        </select>
                    </div>

                    <div class="col-md-2">
                        <label class="form-label">Max Price</label>
                        <input type="number"
                               step="0.01"
                               class="form-control"
                               name="maxPrice"
                               placeholder="500"
                               th:value="${maxPrice}">
                    </div>

                    <div class="col-md-2">
                        <label class="form-label">Sort</label>
                        <select class="form-select" name="sort">
                            <option value="">Default</option>
                            <option value="priceAsc" th:selected="${sort == 'priceAsc'}">Low to High</option>
                            <option value="priceDesc" th:selected="${sort == 'priceDesc'}">High to Low</option>
                        </select>
                    </div>

                    <div class="col-md-2">
                        <button type="submit" class="btn btn-primary w-100">Apply</button>
                    </div>
                </div>

                <div class="mt-3">
                    <a href="/parts" class="btn btn-outline-secondary btn-sm">Clear Filters</a>
                </div>
            </form>
        </div>
    </div>

    <div class="row">
        <div class="col-md-4 mb-4" th:each="part : ${parts}">
            <div class="card h-100 shadow-sm">

                <img th:if="${part.imageUrl != null}"
                     th:src="@{'/images/parts/' + ${part.imageUrl}}"
                     class="card-img-top"
                     style="height: 190px; object-fit: contain; padding: 15px;"
                     alt="Part image">

                <div class="card-body">
                    <h5 class="card-title fw-bold" th:text="${part.partName}"></h5>

                    <p class="mb-1">
                        <strong>Brand:</strong>
                        <span th:text="${part.brand}"></span>
                    </p>

                    <p class="mb-1">
                        <strong>Category:</strong>
                        <span th:text="${part.category.categoryName}"></span>
                    </p>

                    <p class="mb-1">
                        <strong>Price:</strong>
                        $<span th:text="${part.price}"></span>
                    </p>

                    <p class="mb-1">
                        <strong>Difficulty:</strong>
                        <span th:text="${part.installDifficulty}"></span>
                    </p>

                    <p class="text-body-secondary small mt-2" th:text="${part.description}"></p>
                </div>

            </div>
        </div>
    </div>
</div>

<script src="/js/theme.js"></script>
</body>
</html>
