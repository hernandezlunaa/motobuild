<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" data-bs-theme="light">
<head>
    <title>Parts - MotoBuild</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/css/motobuild-theme.css?v=2">

    <style>
        div[id^="part-"]:target .card {
            outline: 3px solid #8f73c9;
            box-shadow: 0 0 18px rgba(143, 115, 201, 0.55);
            animation: partAddedHighlight 1.5s ease;
        }

        @keyframes partAddedHighlight {
            0% {
                transform: scale(1.03);
            }

            100% {
                transform: scale(1);
            }
        }

        .theme-toggle-btn {
            position: fixed;
            bottom: 25px;
            right: 25px;
            width: 54px;
            height: 54px;
            border-radius: 50%;
            border: none;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0;
            z-index: 9999;
            box-shadow: 0 4px 14px rgba(0, 0, 0, 0.3);
            transition: transform 0.2s ease, box-shadow 0.2s ease, background-color 0.25s ease;
        }

        .theme-toggle-btn:hover {
            transform: scale(1.08) rotate(8deg);
            box-shadow: 0 6px 18px rgba(0, 0, 0, 0.4);
        }

        .theme-toggle-icon {
            width: 30px;
            height: 30px;
            object-fit: contain;
        }

        .theme-icon-animate {
            animation: themeIconSpin 0.35s ease;
        }

        @keyframes themeIconSpin {
            0% {
                opacity: 0;
                transform: rotate(-120deg) scale(0.5);
            }

            100% {
                opacity: 1;
                transform: rotate(0deg) scale(1);
            }
        }
    </style>
</head>

<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand fw-bold" href="/">MotoBuild</a>

        <div class="d-flex gap-2">
            <a class="btn btn-outline-light btn-sm" href="/motorcycles">Motorcycles</a>
            <a class="btn btn-light btn-sm" href="/parts">Parts</a>
            <a class="btn btn-outline-light btn-sm" href="/builds">Builds</a>
        </div>
    </div>
</nav>

<div class="container mt-5 mb-5">
    <div th:if="${successMessage}" class="alert alert-success" th:text="${successMessage}"></div>

    <div class="d-flex justify-content-between align-items-start flex-wrap gap-3 mb-3">
        <div>
            <h1 class="fw-bold motobuild-title">Parts Catalog</h1>
            <p class="text-body-secondary mb-0">Search, filter, sort, and add parts to a build.</p>
        </div>

        <div class="d-flex gap-2 flex-wrap">
            <a th:if="${selectedBuild != null}"
               th:href="@{/builds/{id}(id=${selectedBuild.buildId})}"
               class="btn btn-success">
                View Selected Build
            </a>

            <a href="/builds" class="btn btn-primary">Create / View Builds</a>
        </div>
    </div>

    <div th:if="${selectedBuild != null}" class="alert alert-info shadow-sm">
        Adding parts to:
        <strong th:text="${selectedBuild.buildName}"></strong>
        —
        <span th:text="${selectedBuild.motorcycle.year}"></span>
        <span th:text="${selectedBuild.motorcycle.make}"></span>
        <span th:text="${selectedBuild.motorcycle.model}"></span>
    </div>

    <form method="get" action="/parts" id="partsFilterForm" class="card card-body mb-4 shadow-sm">
        <div class="row g-3 align-items-end">

            <div class="col-md-3">
                <label class="form-label">Search</label>
                <input type="text"
                       id="searchInput"
                       class="form-control"
                       name="search"
                       placeholder="Exhaust, Brembo..."
                       th:value="${search}">
            </div>

            <div class="col-md-2">
                <label class="form-label">Category</label>
                <select class="form-select auto-submit" name="categoryId">
                    <option value="">All Categories</option>
                    <option th:each="category : ${categories}"
                            th:value="${category.categoryId}"
                            th:text="${category.categoryName}"
                            th:selected="${selectedCategoryId != null && selectedCategoryId == category.categoryId}">
                    </option>
                </select>
            </div>

            <div class="col-md-2">
                <label class="form-label">Max Price</label>
                <input type="number"
                       id="maxPriceInput"
                       step="100"
                       min="0"
                       class="form-control"
                       name="maxPrice"
                       placeholder="500"
                       th:value="${maxPrice}">
            </div>

            <div class="col-md-2">
                <label class="form-label">Sort</label>
                <select class="form-select auto-submit" name="sort">
                    <option value="">Default</option>
                    <option value="priceAsc" th:selected="${sort == 'priceAsc'}">Low to High</option>
                    <option value="priceDesc" th:selected="${sort == 'priceDesc'}">High to Low</option>
                </select>
            </div>

            <div class="col-md-3">
                <label class="form-label">Selected Build</label>
                <select class="form-select auto-submit" name="buildId">
                    <option value="">Choose a build to add parts</option>
                    <option th:each="build : ${builds}"
                            th:value="${build.buildId}"
                            th:text="${build.buildName + ' - ' + build.motorcycle.year + ' ' + build.motorcycle.make + ' ' + build.motorcycle.model}"
                            th:selected="${selectedBuildId != null && selectedBuildId == build.buildId}">
                    </option>
                </select>
            </div>
        </div>

        <div class="mt-3 d-flex gap-2 flex-wrap">
            <a href="/parts" class="btn btn-outline-secondary btn-sm">Clear Filters</a>
        </div>
    </form>

    <div th:if="${selectedBuildId == null}" class="alert alert-info shadow-sm">
        Choose a build in the filter box if you want the Add to Build buttons to show up.
    </div>

    <div class="row">
        <div class="col-md-4 mb-4"
             th:each="part : ${parts}"
             th:id="'part-' + ${part.partId}">
            <div class="card h-100 shadow-sm">

                <img th:if="${part.imageUrl != null}"
                     th:src="@{'/images/parts/' + ${part.imageUrl}}"
                     class="card-img-top"
                     style="height: 190px; object-fit: contain; padding: 15px;"
                     alt="Part image">

                <div class="card-body d-flex flex-column">
                    <h5 class="card-title fw-bold" th:text="${part.partName}"></h5>

                    <p class="mb-1">
                        <strong>Brand:</strong>
                        <span th:text="${part.brand}"></span>
                    </p>

                    <p class="mb-1">
                        <strong>Category:</strong>
                        <span th:text="${part.category.categoryName}"></span>
                    </p>

                    <p class="mb-1">
                        <strong>Price:</strong>
                        $<span th:text="${#numbers.formatDecimal(part.price, 1, 2)}"></span>
                    </p>

                    <p class="mb-1">
                        <strong>Difficulty:</strong>
                        <span th:text="${part.installDifficulty}"></span>
                    </p>

                    <p class="text-body-secondary small mt-2" th:text="${part.description}"></p>

                    <div class="mt-auto">
                        <form th:if="${selectedBuildId != null && !addedBuildPartIdsByPartId.containsKey(part.partId)}"
                              th:action="@{/builds/{buildId}/parts/{partId}/add(buildId=${selectedBuildId}, partId=${part.partId})}"
                              method="post">
                            <button type="submit" class="btn btn-motobuild-purple w-100">
                                Add to Build
                            </button>
                        </form>

                        <form th:if="${selectedBuildId != null && addedBuildPartIdsByPartId.containsKey(part.partId)}"
                              th:action="@{/builds/{buildId}/parts/{buildPartId}/remove(buildId=${selectedBuildId}, buildPartId=${addedBuildPartIdsByPartId.get(part.partId)})}"
                              method="post">
                            <input type="hidden" name="redirectPartId" th:value="${part.partId}">

                            <button type="submit" class="btn w-100 added-part-btn">
                                <span class="added-label">Part Already Added</span>
                                <span class="remove-label">Remove from Build</span>
                            </button>
                        </form>

                        <button th:if="${selectedBuildId == null}"
                                type="button"
                                class="btn btn-outline-secondary w-100"
                                disabled>
                            Select Build First
                        </button>
                    </div>
                </div>

            </div>
        </div>
    </div>
</div>

<button id="themeToggle" class="theme-toggle-btn" type="button">
    <img id="themeIcon" class="theme-toggle-icon" src="/images/ui/moon.png" alt="Switch theme">
</button>

<script>
    document.addEventListener("DOMContentLoaded", () => {
        const form = document.getElementById("partsFilterForm");
        const searchInput = document.getElementById("searchInput");
        const maxPriceInput = document.getElementById("maxPriceInput");
        const autoSubmitFields = document.querySelectorAll(".auto-submit");

        let typingTimer;

        function cleanMaxPrice() {
            if (!maxPriceInput) return;

            const value = maxPriceInput.value.trim();

            if (value !== "" && Number(value) < 0) {
                maxPriceInput.value = 0;
            }
        }

        function submitFilters() {
            cleanMaxPrice();

            if (form) {
                form.requestSubmit();
            }
        }

        if (searchInput) {
            searchInput.addEventListener("input", () => {
                clearTimeout(typingTimer);
                typingTimer = setTimeout(submitFilters, 1500);
            });
        }

        if (maxPriceInput) {
            maxPriceInput.addEventListener("input", () => {
                clearTimeout(typingTimer);
                typingTimer = setTimeout(submitFilters, 650);
            });

            maxPriceInput.addEventListener("change", () => {
                cleanMaxPrice();
                submitFilters();
            });
        }

        autoSubmitFields.forEach((field) => {
            field.addEventListener("change", submitFilters);
        });
    });
</script>

<script src="/js/theme.js?v=2"></script>
</body>
</html>
